<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Communication Hub</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242736;
            --border: #2e3142;
            --text: #e4e6f0;
            --text-dim: #8b8fa3;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --critical: #ef4444;
            --high: #f97316;
            --medium: #eab308;
            --low: #22c55e;
            --codex: #a78bfa;
            --radius: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ─────────────────────── */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--codex));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.connected {
            background: rgba(34, 197, 94, 0.15);
            color: var(--low);
        }

        .status-badge.disconnected {
            background: rgba(239, 68, 68, 0.15);
            color: var(--critical);
        }

        /* ── Layout ─────────────────────── */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* ── Cards ──────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-body {
            padding: 16px 20px;
        }

        /* ── Timeline ───────────────────── */
        .timeline {
            max-height: 60vh;
            overflow-y: auto;
        }

        .timeline-event {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: flex-start;
            animation: fadeIn 0.3s ease-out;
            transition: background 0.15s;
        }

        .timeline-event:hover {
            background: var(--surface2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .event-seq {
            font-size: 11px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
            min-width: 30px;
            padding-top: 2px;
        }

        .event-agent {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            min-width: 70px;
            text-align: center;
        }

        .event-agent.codex {
            background: rgba(167, 139, 250, 0.15);
            color: var(--codex);
        }


        .event-content {
            flex: 1;
            font-size: 13px;
            line-height: 1.5;
        }

        .event-type {
            color: var(--text-dim);
            font-size: 11px;
        }

        .event-time {
            color: var(--text-dim);
            font-size: 11px;
            white-space: nowrap;
        }

        /* ── Findings Table ──────────────── */
        .findings-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .findings-table th {
            text-align: left;
            padding: 10px 16px;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        .findings-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        .findings-table tr:hover {
            background: var(--surface2);
        }

        .severity-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .severity-dot.critical {
            background: var(--critical);
            box-shadow: 0 0 6px var(--critical);
        }

        .severity-dot.high {
            background: var(--high);
        }

        .severity-dot.medium {
            background: var(--medium);
        }

        .severity-dot.low {
            background: var(--low);
        }

        .agent-badges {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .agent-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
        }

        .agent-badge.codex {
            background: rgba(167, 139, 250, 0.2);
            color: var(--codex);
        }


        /* ── Agent Status ───────────────── */
        .agent-card {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .agent-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .agent-icon.codex {
            background: rgba(167, 139, 250, 0.2);
            color: var(--codex);
        }


        .agent-info {
            flex: 1;
        }

        .agent-name {
            font-weight: 600;
            font-size: 14px;
        }

        .agent-status {
            font-size: 12px;
            color: var(--text-dim);
        }

        .agent-count {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        /* ── Empty State ───────────────── */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-dim);
        }

        .empty-state .emoji {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 14px;
            max-width: 300px;
            margin: 0 auto;
        }

        /* ── Session Selector ──────────── */
        .session-select {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        /* ── Collaboration UI ──────────── */
        .collab-badge {
            display: inline-block;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .collab-badge.awaiting { background: rgba(234,179,8,0.15); color: var(--medium); }
        .collab-badge.reviewing { background: rgba(99,102,241,0.15); color: var(--accent); }
        .collab-badge.resolution { background: rgba(249,115,22,0.15); color: var(--high); }
        .collab-badge.resolved { background: rgba(34,197,94,0.15); color: var(--low); }
        .collab-badge.terminal { background: rgba(139,143,163,0.15); color: var(--text-dim); }

        .collab-panel {
            padding: 12px 16px;
            font-size: 13px;
        }
        .collab-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }
        .collab-row:last-child { border-bottom: none; }
        .collab-label {
            color: var(--text-dim);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .collab-value {
            font-weight: 500;
            font-size: 13px;
        }
        .collab-value.unassigned {
            color: var(--text-dim);
            font-style: italic;
        }

        /* ── Timeline Messages ─────────── */
        .timeline-message {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: flex-start;
            animation: fadeIn 0.3s ease-out;
            transition: background 0.15s;
            background: rgba(99,102,241,0.03);
            border-left: 3px solid var(--accent);
        }
        .timeline-message:hover { background: rgba(99,102,241,0.06); }

        .msg-role {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .msg-role.reviewer { background: rgba(167,139,250,0.2); color: var(--codex); }
        .msg-role.responder { background: rgba(99,102,241,0.2); color: var(--accent); }
        .msg-role.decider { background: rgba(249,115,22,0.2); color: var(--high); }
        .msg-role.system { background: rgba(139,143,163,0.2); color: var(--text-dim); }

        .timeline-collab-marker {
            padding: 6px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            color: var(--medium);
            font-weight: 600;
            text-align: center;
            background: rgba(234,179,8,0.05);
            letter-spacing: 0.5px;
        }

        /* ── Scrollbar ─────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="header">
        <h1>⚡ Agent Communication Hub</h1>
        <div style="display: flex; align-items: center; gap: 12px;">
            <select id="sessionSelect" class="session-select">
                <option value="">— Select Session —</option>
            </select>
            <span id="wsStatus" class="status-badge disconnected">Disconnected</span>
        </div>
    </div>

    <div class="container">
        <!-- Main Content -->
        <div>
            <!-- Findings Card -->
            <div class="card" style="margin-bottom: 24px;">
                <div class="card-header">
                    <span>📋 Findings</span>
                    <span id="findingCount" style="color: var(--accent); font-size: 16px; font-weight: 700;">0</span>
                </div>
                <div id="findingsContainer" style="overflow-x: auto;">
                    <div class="empty-state">
                        <div class="emoji">🔍</div>
                        <p>No findings yet. Start a review session to see results.</p>
                    </div>
                </div>
            </div>

            <!-- Merged Timeline Card -->
            <div class="card">
                <div class="card-header">
                    <span>📡 Timeline (Events + Messages)</span>
                    <span id="eventCount" style="font-size: 12px;">0 items</span>
                </div>
                <div id="timeline" class="timeline">
                    <div class="empty-state">
                        <div class="emoji">⏳</div>
                        <p>Waiting for events...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div>
            <!-- Session Info Card -->
            <div class="card" style="margin-bottom: 24px;">
                <div class="card-header">📝 Session Info</div>
                <div class="card-body">
                    <div id="sessionInfo" style="font-size: 13px; color: var(--text-dim);">
                        No session selected
                    </div>
                </div>
            </div>

            <!-- Collaboration State Card -->
            <div class="card" style="margin-bottom: 24px;">
                <div class="card-header">🤝 Collaboration</div>
                <div id="collabPanel" class="collab-panel">
                    <div style="color: var(--text-dim); font-size: 13px;">No session selected</div>
                </div>
            </div>

            <!-- Agent Status Card -->
            <div class="card">
                <div class="card-header">🤖 Agents</div>
                <div id="agentStatus">
                    <div class="agent-card">
                        <div class="agent-icon codex">Cx</div>
                        <div class="agent-info">
                            <div class="agent-name">Codex</div>
                            <div class="agent-status" id="codexStatus">Idle</div>
                        </div>
                        <div class="agent-count" id="codexFindings">—</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/session-autoselect.js"></script>
    <script>
        // ── State ────────────────────────
        let ws = null;
        let currentSessionId = null;
        let timelineItems = [];
        let reconnectTimer = null;
        let reconnectDelay = 1000;

        // ── DOM ──────────────────────────
        const $wsStatus = document.getElementById('wsStatus');
        const $sessionSelect = document.getElementById('sessionSelect');
        const $timeline = document.getElementById('timeline');
        const $eventCount = document.getElementById('eventCount');
        const $findingsContainer = document.getElementById('findingsContainer');
        const $findingCount = document.getElementById('findingCount');
        const $sessionInfo = document.getElementById('sessionInfo');
        const $collabPanel = document.getElementById('collabPanel');
        const $codexStatus = document.getElementById('codexStatus');
        const $codexFindings = document.getElementById('codexFindings');

        function getSessionDisplayState(session) {
            return session?.displayState || (session?.watchdog?.stalled ? 'stalled' : session?.state) || 'unknown';
        }

        function escapeHtml(str) {
            if (str == null) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // ── Collab Helpers ────────────────
        function collabBadgeClass(state) {
            if (!state) return 'terminal';
            if (state.includes('awaiting')) return 'awaiting';
            if (state.includes('reviewing')) return 'reviewing';
            if (state === 'awaiting_resolution') return 'resolution';
            if (state === 'resolved') return 'resolved';
            return 'terminal';
        }

        function formatCollabState(state) {
            if (!state) return 'unknown';
            return state.replace(/_/g, ' ');
        }

        function renderCollabPanel(session) {
            if (!session) {
                $collabPanel.innerHTML = '<div style="color: var(--text-dim); font-size: 13px;">No session selected</div>';
                return;
            }

            const cs = session.collabState || 'draft';
            const a = session.assignments || {};
            const t = session.turn || {};

            const turnOwner = t.ownerId || '—';
            const turnStatus = t.status || 'idle';
            const turnClaimed = t.claimedAt ? new Date(t.claimedAt).toLocaleTimeString() : '—';
            const turnExpires = t.claimExpiresAt ? new Date(t.claimExpiresAt).toLocaleTimeString() : '—';

            $collabPanel.innerHTML = `
                <div class="collab-row">
                    <span class="collab-label">State</span>
                    <span class="collab-badge ${collabBadgeClass(cs)}">${formatCollabState(cs)}</span>
                </div>
                <div class="collab-row">
                    <span class="collab-label">Reviewer</span>
                    <span class="collab-value ${a.reviewer ? '' : 'unassigned'}">${escapeHtml(a.reviewer || 'unassigned')}</span>
                </div>
                <div class="collab-row">
                    <span class="collab-label">Responder</span>
                    <span class="collab-value ${a.responder ? '' : 'unassigned'}">${escapeHtml(a.responder || 'unassigned')}</span>
                </div>
                <div class="collab-row">
                    <span class="collab-label">Decider</span>
                    <span class="collab-value ${a.decider ? '' : 'unassigned'}">${escapeHtml(a.decider || 'unassigned')}</span>
                </div>
                <div class="collab-row">
                    <span class="collab-label">Turn Owner</span>
                    <span class="collab-value">${escapeHtml(turnOwner)}</span>
                </div>
                <div class="collab-row">
                    <span class="collab-label">Turn Status</span>
                    <span class="collab-value">${escapeHtml(turnStatus)}</span>
                </div>
                ${turnStatus === 'claimed' ? `
                <div class="collab-row">
                    <span class="collab-label">Claimed</span>
                    <span class="collab-value">${turnClaimed}</span>
                </div>
                <div class="collab-row">
                    <span class="collab-label">Expires</span>
                    <span class="collab-value">${turnExpires}</span>
                </div>
                ` : ''}
                <div class="collab-row">
                    <span class="collab-label">Messages</span>
                    <span class="collab-value">${(session.messages || []).length}</span>
                </div>
            `;
        }

        // ── WebSocket ────────────────────
        function connectWs() {
            const wsUrl = `ws://${window.location.host}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                $wsStatus.className = 'status-badge connected';
                $wsStatus.textContent = 'Connected';
                reconnectDelay = 1000;
                if (currentSessionId) {
                    ws.send(JSON.stringify({ subscribe: currentSessionId }));
                }
            };

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'event') {
                    handleEvent(msg.event);
                }
            };

            ws.onclose = () => {
                $wsStatus.className = 'status-badge disconnected';
                $wsStatus.textContent = 'Disconnected';
                reconnectTimer = setTimeout(() => {
                    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
                    connectWs();
                }, reconnectDelay);
            };

            ws.onerror = () => ws.close();
        }

        // ── Event Handling ────────────────
        function handleEvent(event) {
            timelineItems.push({ kind: 'event', data: event, ts: event.timestamp });
            renderTimelineEvent(event);
            updateAgentStatus(event);
            updateTimelineCount();
        }

        function updateTimelineCount() {
            $eventCount.textContent = `${timelineItems.length} items`;
        }

        function renderTimelineEvent(event) {
            // Remove empty state on first item
            if (timelineItems.length === 1) {
                $timeline.innerHTML = '';
            }

            // Collab state transition marker
            if (event.event_type === 'collab_state_changed' || event.event_type === 'collab_advance') {
                const marker = document.createElement('div');
                marker.className = 'timeline-collab-marker';
                const fromState = event.payload?.previousState || event.payload?.from || '?';
                const toState = event.payload?.nextState || event.payload?.to || '?';
                marker.textContent = `⚡ ${fromState} → ${toState}`;
                $timeline.prepend(marker);
                return;
            }

            const div = document.createElement('div');
            div.className = 'timeline-event';

            const agentClass = event.agent_id;
            const time = new Date(event.timestamp).toLocaleTimeString();
            let content = '';

            if (event.event_type === 'status') {
                content = escapeHtml(event.payload.state || JSON.stringify(event.payload));
            } else if (event.event_type === 'finding') {
                content = `<strong>Finding:</strong> ${escapeHtml(event.payload?.raw?.summary || 'New finding')}`;
            } else if (event.event_type === 'error') {
                content = `<span style="color: var(--critical);">Error: ${escapeHtml(event.payload?.message || 'Unknown')}</span>`;
            } else if (event.event_type === 'raw_output') {
                const preview = (event.payload?.data || '').slice(0, 100);
                content = `<span style="opacity: 0.6">${escapeHtml(preview)}</span>`;
            } else {
                content = escapeHtml(event.event_type);
            }

            div.innerHTML = `
                <span class="event-seq">#${escapeHtml(event.seq ?? '?')}</span>
                <span class="event-agent ${escapeHtml(agentClass)}">${escapeHtml(event.agent_id)}</span>
                <span class="event-content">
                    <span class="event-type">${escapeHtml(event.event_type)}</span><br>
                    ${content}
                </span>
                <span class="event-time">${time}</span>
            `;

            $timeline.prepend(div);

            while ($timeline.children.length > 300) {
                $timeline.removeChild($timeline.lastChild);
            }
        }

        function renderTimelineMessage(msg) {
            const div = document.createElement('div');
            div.className = 'timeline-message';

            const time = new Date(msg.createdAt).toLocaleTimeString();
            const contentPreview = (msg.content || '').slice(0, 200);
            const refsNote = (msg.findingRefs && msg.findingRefs.length > 0)
                ? `<span style="font-size:11px; color: var(--text-dim);"> (${msg.findingRefs.length} finding ref${msg.findingRefs.length > 1 ? 's' : ''})</span>`
                : '';

            div.innerHTML = `
                <span class="event-seq">💬</span>
                <span class="msg-role ${escapeHtml(msg.role)}">${escapeHtml(msg.role)}</span>
                <span class="event-content">
                    <span class="event-type">${escapeHtml(msg.type)}${refsNote}</span><br>
                    ${escapeHtml(contentPreview)}${msg.content.length > 200 ? '…' : ''}
                </span>
                <span class="event-time">${time}</span>
            `;

            $timeline.prepend(div);
        }

        function updateAgentStatus(event) {
            if (event.event_type !== 'status') return;
            const state = event.payload?.state;
            if (!['codex', 'mcp-codex'].includes(event.agent_id)) return;

            const $status = $codexStatus;
            const $count = $codexFindings;

            if (state === 'started') $status.textContent = '🟢 Running...';
            if (state === 'done') {
                $status.textContent = event.payload.status === 'ok' ? '✅ Completed' : '❌ ' + event.payload.status;
                $count.textContent = event.payload.findingCount ?? 0;
            }
            if (state === 'killing') $status.textContent = '⏹ Stopping...';
        }

        // ── Session Management ────────────
        async function loadSessions() {
            try {
                const res = await fetch('/api/sessions');
                const data = await res.json();
                const sessions = data.sessions || [];
                $sessionSelect.innerHTML = '<option value="">— Select Session —</option>';
                for (const s of sessions) {
                    const opt = document.createElement('option');
                    opt.value = s.id;
                    const displayState = getSessionDisplayState(s);
                    const collabLabel = s.collabState ? ` [${s.collabState}]` : '';
                    opt.textContent = s.label
                        ? `${s.label} (${displayState}${collabLabel})`
                        : `${s.id.slice(0, 8)}... (${displayState}${collabLabel})`;
                    $sessionSelect.appendChild(opt);
                }

                if (!currentSessionId && sessions.length > 0 && window.pickBestSession) {
                    const best = window.pickBestSession(sessions);
                    if (best?.id) {
                        $sessionSelect.value = best.id;
                        $sessionSelect.dispatchEvent(new Event('change'));
                    }
                }

                if (currentSessionId) {
                    const current = sessions.find((session) => session.id === currentSessionId);
                    if (current?.watchdog?.stalled) {
                        $codexStatus.textContent = '⏳ Stalled';
                    }
                }
            } catch { /* offline */ }
        }

        $sessionSelect.addEventListener('change', async (e) => {
            currentSessionId = e.target.value;
            timelineItems = [];
            $timeline.innerHTML = '<div class="empty-state"><div class="emoji">⏳</div><p>Waiting for events...</p></div>';
            renderCollabPanel(null);

            if (!currentSessionId) return;

            // Subscribe via WebSocket
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ subscribe: currentSessionId }));
            }

            try {
                // Load events, session, and messages in parallel
                const [eventsRes, sessionRes, messagesRes] = await Promise.all([
                    fetch(`/api/sessions/${currentSessionId}/events`),
                    fetch(`/api/sessions/${currentSessionId}`),
                    fetch(`/api/sessions/${currentSessionId}/messages`),
                ]);

                const eventsData = await eventsRes.json();
                const sessionData = await sessionRes.json();
                const messagesData = await messagesRes.json();

                // Build merged timeline
                const allEvents = (eventsData.events || []).map(ev => ({ kind: 'event', data: ev, ts: ev.timestamp }));
                const allMessages = (messagesData.messages || []).map(m => ({ kind: 'message', data: m, ts: m.createdAt }));
                timelineItems = [...allEvents, ...allMessages].sort((a, b) => new Date(a.ts) - new Date(b.ts));

                // Render merged timeline
                if (timelineItems.length > 0) {
                    $timeline.innerHTML = '';
                    for (const item of timelineItems) {
                        if (item.kind === 'event') {
                            renderTimelineEvent(item.data);
                        } else {
                            renderTimelineMessage(item.data);
                        }
                    }
                }
                updateTimelineCount();

                // Render session info + collab panel
                if (sessionData.session) {
                    renderSessionInfo(sessionData.session);
                    renderCollabPanel(sessionData.session);
                    renderFindings(sessionData.session);
                    if (sessionData.watchdog?.stalled) {
                        $codexStatus.textContent = '⏳ Stalled';
                    }
                }
            } catch { /* offline */ }
        });

        function renderSessionInfo(session) {
            const displayState = getSessionDisplayState(session);
            const stalledNote = session.watchdog?.stalled
                ? `<div style="margin-bottom: 8px; color: var(--high);"><strong>Watchdog:</strong> stalled after ${Math.round(session.watchdog.idleMs / 1000)}s idle</div>`
                : '';
            $sessionInfo.innerHTML = `
                ${session.label ? `<div style="margin-bottom: 8px"><strong>Label:</strong> ${escapeHtml(session.label)}</div>` : ''}
                <div style="margin-bottom: 8px"><strong>ID:</strong> ${escapeHtml(session.id.slice(0, 12))}...</div>
                <div style="margin-bottom: 8px"><strong>State:</strong> ${escapeHtml(displayState)}</div>
                ${stalledNote}
                <div style="margin-bottom: 8px"><strong>Project:</strong> ${escapeHtml(session.projectDir)}</div>
                <div style="margin-bottom: 8px"><strong>Round:</strong> ${session.round ?? 1}</div>
                <div style="margin-bottom: 8px"><strong>Created:</strong> ${new Date(session.createdAt).toLocaleString()}</div>
                ${session.parentSessionId ? `<div><strong>Retry of:</strong> ${escapeHtml(session.parentSessionId.slice(0, 8))}...</div>` : ''}
            `;
        }

        function renderFindings(session) {
            const findings = (session.mergedFindings && session.mergedFindings.length > 0)
                ? session.mergedFindings
                : (session.groupedFindings || []);
            $findingCount.textContent = findings.length;

            if (findings.length === 0) {
                $findingsContainer.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><p>No findings yet.</p></div>';
                return;
            }

            let html = '<table class="findings-table"><thead><tr>';
            html += '<th>Sev</th><th>Summary</th><th>File</th><th>Line</th><th>Agents</th>';
            html += '</tr></thead><tbody>';

            for (const group of findings) {
                const f = group.finding || group;
                const agentBadges = (group.agents || []).map(a =>
                    `<span class="agent-badge ${escapeHtml(a)}">${escapeHtml(a)}</span>`
                ).join('');
                const details = [];
                if (f.why_it_matters) {
                    details.push(`<div style="margin-top: 6px; color: var(--text-dim);"><strong style="color: var(--text);">Why:</strong> ${escapeHtml(f.why_it_matters)}</div>`);
                }
                if (f.fix_instructions) {
                    details.push(`<div style="margin-top: 6px; color: var(--text-dim);"><strong style="color: var(--text);">Fix:</strong> ${escapeHtml(f.fix_instructions)}</div>`);
                }
                if (f.evidence) {
                    details.push(`<div style="margin-top: 6px; color: var(--text-dim);"><strong style="color: var(--text);">Evidence:</strong> ${escapeHtml(f.evidence)}</div>`);
                }

                html += `<tr>
                    <td><span class="severity-dot ${escapeHtml(f.severity)}"></span>${escapeHtml(f.severity)}</td>
                    <td><div>${escapeHtml(f.summary)}</div>${details.join('')}</td>
                    <td style="font-family: monospace; font-size: 12px;">${escapeHtml(f.file)}</td>
                    <td>${escapeHtml(f.line ?? '—')}</td>
                    <td><div class="agent-badges">${agentBadges}</div></td>
                </tr>`;
            }

            html += '</tbody></table>';
            $findingsContainer.innerHTML = html;
        }

        // ── Init ──────────────────────────
        loadSessions();
        connectWs();

        // Refresh session list periodically
        setInterval(loadSessions, 10000);
    </script>
</body>

</html>
